/* ─── Photo avec fallback placeholder ─── */
function Photo({ src, alt, style = {} }) {
  const [err, setErr] = useState(false);
  if (!src || err) {
    return (
      <div className="photo-placeholder" style={style}>
        {alt || 'photo à venir'}
      </div>
    );
  }
  return (
    <img
      src={src}
      alt={alt}
      onError={() => setErr(true)}
      style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', ...style }}
    />
  );
}

  return (
    <>

        position: 'sticky', top: 0, zIndex: 200,

/* ─── Product Card ─── */
function ProductCard({ p }) {
  const [hov, setHov] = useState(false);
  return (
    <div style={{
      background: '#EEEADB', border: '1px solid rgba(61,58,44,0.10)',
      overflow: 'hidden', cursor: 'pointer',
      boxShadow: hov ? '0 6px 20px rgba(61,58,44,0.10)' : '0 1px 4px rgba(61,58,44,0.06)',
      transition: 'all 300ms cubic-bezier(.22,1,.36,1)',
      transform: hov ? 'translateY(-2px)' : 'none',
    }}
    onMouseEnter={() => setHov(true)}
    onMouseLeave={() => setHov(false)}>
      <div style={{ width: '100%', aspectRatio: '4/5', background: '#E8E4D4', position: 'relative', overflow: 'hidden' }}>
        <Photo src={p.img} alt={p.title}/>
      </div>
      <div style={{ padding: '14px 16px' }}>
        {p.tag && (
          <span style={{
            fontFamily: "'Space Mono',monospace", fontSize: '0.55rem',
            letterSpacing: '0.08em', textTransform: 'uppercase',
            color: '#7A7A6A', display: 'block', marginBottom: '5px',
          }}>{p.tag}</span>
        )}
        <p style={{ fontFamily: "'Bodoni Moda',Georgia,serif", fontWeight: 400, fontSize: '0.9rem', color: '#3D3A2C', letterSpacing: '-0.01em', marginBottom: '3px' }}>{p.title}</p>
        <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', color: '#7A7A6A', marginBottom: '8px' }}>{p.subtitle}</p>
        <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.7rem', color: '#3D3A2C' }}>{p.price}</p>
      </div>
    </div>
  );
}

/* ─── Product Grid ─── */
function ProductGrid() {
  const filters = ['tout', 'nouveau', 'moins de 100 €'];
  const [filter, setFilter] = useState('tout');

  const visible = filter === 'tout'         ? products
    : filter === 'nouveau'                  ? products.filter(p => p.tag === 'nouveau')
    : products.filter(p => parseInt(p.price) < 100);

  return (
    <section id="bouquets" className="section-px" style={{ paddingTop: '72px', paddingBottom: '80px', background: '#EEEADB', position: 'relative', overflow: 'hidden' }}>
      <div className="blob d2" style={{ width: '300px', height: '240px', bottom: '-60px', left: '-50px', background: blobCool, filter: 'blur(80px)', opacity: 0.40 }}/>
      <div style={{ marginBottom: '32px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: '12px', position: 'relative', zIndex: 2 }}>
        <div>
          <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.625rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#7A7A6A', display: 'block', marginBottom: '10px' }}>shop</span>
          <p className="logo" style={{ fontSize: 'clamp(26px,4vw,52px)', color: '#3D3A2C', lineHeight: 1.0 }}>bouquets</p>
        </div>
      </div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '32px', flexWrap: 'wrap', position: 'relative', zIndex: 2 }}>
        {filters.map(f => {
          const active = filter === f;
          return (
            <button key={f} onClick={() => setFilter(f)} style={{
              fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.06em',
              padding: '5px 12px', cursor: 'pointer', transition: 'all 200ms',
              background: active ? '#3D3A2C' : 'transparent',
              color:      active ? '#F0ECD8' : '#7A7A6A',
              border:     '1px solid ' + (active ? '#3D3A2C' : 'rgba(61,58,44,0.22)'),
            }}>{f}</button>
          );
        })}
      </div>
      <div className="grid-cols-3" style={{ position: 'relative', zIndex: 2 }}>
        {visible.map((p, i) => <ProductCard key={i} p={p}/>)}
      </div>
    </section>
  );
}

/* ─── Contact ─── */
function Contact() {
  const [sent, setSent]         = useState(false);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [form, setForm]         = useState({ nom: '', email: '', message: '' });
  const [botField, setBotField] = useState('');
  const loadTime                = React.useRef(Date.now());

  const update = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');

    // Anti-spam 1 : honeypot Netlify rempli → bot silencieux
    if (botField) { setSent(true); return; }

    // Anti-spam 2 : soumission < 3 s après affichage → bot probable
    if (Date.now() - loadTime.current < 3000) {
      setError('Merci de prendre un moment pour compléter le formulaire.');
      return;
    }

    // Anti-spam 3 : rate limiting côté client (max 3 envois / heure)
    const now    = Date.now();
    const LS_KEY = 'belleire_form_ts';
    const recent = (JSON.parse(localStorage.getItem(LS_KEY) || '[]'))
                     .filter(t => now - t < 3_600_000);
    if (recent.length >= 3) {
      setError('Trop de tentatives. Veuillez réessayer dans une heure ou nous appeler directement.');
      return;
    }

    setLoading(true);
    try {
      const body = new URLSearchParams({
        'form-name': 'contact',
        'bot-field': botField,
        nom:         form.nom,
        email:       form.email,
        message:     form.message,
      }).toString();
      const res = await fetch('/', {
        method:  'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });
      if (!res.ok) throw new Error();
      localStorage.setItem(LS_KEY, JSON.stringify([...recent, now]));
      setSent(true);
    } catch {
      setError("Une erreur est survenue. Veuillez réessayer ou nous contacter par téléphone.");
    } finally {
      setLoading(false);
    }
  };

  const inputStyle = {
    fontFamily: "'Space Mono',monospace", fontSize: '0.82rem',
    background: 'transparent', border: 'none', borderBottom: '1px solid rgba(61,58,44,0.22)',
    padding: '8px 0', color: '#3D3A2C', outline: 'none', width: '100%',
  };
  return (
    <section id="contact" className="section-px" style={{ background: '#F0ECD8', paddingTop: '80px', paddingBottom: '80px', position: 'relative', overflow: 'hidden' }}>
      <div className="blob" style={{ width: '320px', height: '260px', top: '-60px', right: '-40px', background: blobWarm, filter: 'blur(100px)', opacity: 0.28 }}/>
      <div style={{ maxWidth: '800px', margin: '0 auto', position: 'relative', zIndex: 2 }}>
        <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.625rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#7A7A6A', display: 'block', marginBottom: '20px' }}>nous joindre</span>
        <p className="logo" style={{ fontSize: 'clamp(28px,4vw,56px)', color: '#3D3A2C', lineHeight: 0.95, marginBottom: '28px' }}>contactez-nous</p>
        <div className="hl" style={{ marginBottom: '40px' }}/>
        <div className="grid-contact">
          <div>
            <p style={{ fontFamily: "'Space Mono',monospace", fontWeight: 400, fontSize: '0.82rem', color: '#7A7A6A', lineHeight: 1.7, marginBottom: '24px' }}>
              Pour toute question sur nos compositions, le BellEire Swap ou une commande, nous sommes disponibles par téléphone ou via le formulaire.
            </p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              <div style={{ borderTop: '1px solid rgba(61,58,44,0.13)', paddingTop: '12px' }}>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.625rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '4px' }}>téléphone</p>
                <p style={{ fontFamily: "'Bodoni Moda',Georgia,serif", fontSize: '1.1rem', color: '#3D3A2C' }}>+32 499 999 340</p>
              </div>
              <div style={{ borderTop: '1px solid rgba(61,58,44,0.13)', paddingTop: '12px' }}>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.625rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '4px' }}>web</p>
                <p style={{ fontFamily: "'Bodoni Moda',Georgia,serif", fontSize: '1.1rem', color: '#3D3A2C' }}>belleire.be</p>
              </div>
            </div>
          </div>
          {sent ? (
            <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'flex-start', gap: '12px', paddingTop: '12px' }}>
              <p className="logo" style={{ fontSize: '28pt', color: '#3D3A2C' }}>merci.</p>
              <p style={{ fontFamily: "'Space Mono',monospace", color: '#7A7A6A', fontSize: '0.82rem', lineHeight: 1.6 }}>Votre message a bien été envoyé. Nous vous répondons dans les plus brefs délais.</p>
              <button
                onClick={() => { setSent(false); setForm({ nom: '', email: '', message: '' }); }}
                style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.65rem', letterSpacing: '0.06em', background: 'none', border: 'none', color: '#7A7A6A', cursor: 'pointer', padding: 0, marginTop: '8px', textDecoration: 'underline' }}>
                envoyer un autre message
              </button>
            </div>
          ) : (
            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
              {/* Honeypot Netlify — piège invisible pour les bots */}
              <input
                type="text"
                name="bot-field"
                value={botField}
                onChange={e => setBotField(e.target.value)}
                className="form-honeypot"
                tabIndex={-1}
                autoComplete="off"
                aria-hidden="true"
              />
              <div>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '6px' }}>nom</p>
                <input value={form.nom} onChange={update('nom')} required placeholder="votre nom" style={inputStyle}/>
              </div>
              <div>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '6px' }}>email</p>
                <input type="email" value={form.email} onChange={update('email')} required placeholder="votre@email.com" style={inputStyle}/>
              </div>
              <div>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '6px' }}>message</p>
                <textarea value={form.message} onChange={update('message')} required placeholder="votre message…" rows={4} style={{ ...inputStyle, resize: 'none', lineHeight: 1.6 }}/>
              </div>
              {error && (
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', color: '#A03020', letterSpacing: '0.04em', lineHeight: 1.5 }}>{error}</p>
              )}
              <button type="submit" disabled={loading} style={{
                fontFamily: "'Space Mono',monospace", fontSize: '0.72rem', letterSpacing: '0.06em',
                padding: '11px 28px',
                background: loading ? '#7A7A6A' : '#3D3A2C', color: '#F0ECD8',
                border: 'none', cursor: loading ? 'default' : 'pointer',
                alignSelf: 'flex-start', transition: 'opacity 0.3s',
              }}
              onMouseEnter={e => { if (!loading) e.currentTarget.style.opacity = '0.8'; }}
              onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
                {loading ? 'envoi en cours…' : 'envoyer'}
              </button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}
