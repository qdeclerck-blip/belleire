/* ─── Photo avec fallback placeholder ─── */
function Photo({ src, alt, style = {} }) {
  const [err, setErr] = useState(false);
  if (!src || err) {
    return (
      <div className="photo-placeholder" style={style}>
        {alt || 'photo à venir'}
      </div>
    );
  }
  return (
    <img
      src={src}
      alt={alt}
      onError={() => setErr(true)}
      style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', ...style }}
    />
  );
}

  return (

    onMouseEnter={() => setHov(true)}

/* ─── Product Grid ─── */

  const filters = ['tout', 'nouveau', 'moins de 100 €'];

  const visible = filter === 'tout'         ? products

    : products.filter(p => parseInt(p.price) < 100);

  return (
    <section className="section-px" style={{ paddingTop: '72px', paddingBottom: '80px', background: '#EEEADB', position: 'relative', overflow: 'hidden' }}>
      <div className="blob d2" style={{ width: '300px', height: '240px', bottom: '-60px', left: '-50px', background: blobCool, filter: 'blur(80px)', opacity: 0.40 }}/>

          </div>
          {sent ? (
            <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'flex-start', gap: '12px', paddingTop: '12px' }}>
              <p className="logo" style={{ fontSize: '28pt', color: '#3D3A2C' }}>merci.</p>
              <p style={{ fontFamily: "'Bodoni Moda',Georgia,serif", color: '#7A7A6A', fontSize: '0.95rem', lineHeight: 1.6 }}>Votre message a bien été envoyé. Nous vous répondons dans les plus brefs délais.</p>
              <button onClick={() => setSent(false)} style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.65rem', letterSpacing: '0.06em', background: 'none', border: 'none', color: '#7A7A6A', cursor: 'pointer', padding: 0, marginTop: '8px', textDecoration: 'underline' }}>envoyer un autre message</button>
            </div>
          ) : (
            <form onSubmit={e => { e.preventDefault(); setSent(true); }} style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
              <div>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '6px' }}>nom</p>
                <input value={form.nom} onChange={update('nom')} required placeholder="votre nom" style={inputStyle}/>
              </div>
              <div>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '6px' }}>email</p>
                <input type="email" value={form.email} onChange={update('email')} required placeholder="votre@email.com" style={inputStyle}/>
              </div>
              <div>
                <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.6rem', letterSpacing: '0.08em', color: '#7A7A6A', marginBottom: '6px' }}>message</p>
                <textarea value={form.message} onChange={update('message')} required placeholder="votre message…" rows={4} style={{ ...inputStyle, resize: 'none', lineHeight: 1.6 }}/>
              </div>
              <button type="submit" style={{
                fontFamily: "'Space Mono',monospace", fontSize: '0.72rem', letterSpacing: '0.06em',
                padding: '11px 28px', background: '#3D3A2C', color: '#F0ECD8',
                border: 'none', cursor: 'pointer', alignSelf: 'flex-start', transition: 'opacity 0.3s',
              }}
              onMouseEnter={e => e.currentTarget.style.opacity = '0.8'}
              onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
                envoyer
              </button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

  return (
    <footer className="section-px" style={{ background: '#EEEADB', paddingTop: '52px', paddingBottom: '32px', borderTop: '1px solid rgba(61,58,44,0.13)', position: 'relative', overflow: 'hidden' }}>
      <div className="blob" style={{ width: '260px', height: '200px', bottom: '-60px', right: '-40px', background: blobWarm, filter: 'blur(72px)', opacity: 0.22 }}/>
      <div className="grid-footer-cols" style={{ position: 'relative', zIndex: 2 }}>
        <div>
          <p className="logo" style={{ fontSize: '1.6rem', color: '#3D3A2C', marginBottom: '14px', lineHeight: 1 }}>belleire</p>
          <div className="hl" style={{ marginBottom: '12px', width: '80px' }}/>
          <p style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.625rem', color: '#7A7A6A', lineHeight: 1.9 }}>couleur, joie &amp; originalité<br/>belleire.be · belgique</p>
        </div>
        {cols.map(col => (
          <div key={col.title}>
            <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.55rem', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#7A7A6A', display: 'block', marginBottom: '16px' }}>{col.title}</span>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
              {col.links.map(l => {
                const [h, setH] = useState(false);
                return (
                  <a key={l} href="#"
                    style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.625rem', color: h ? '#3D3A2C' : '#7A7A6A', letterSpacing: '0.03em', transition: 'color 0.3s' }}
                    onMouseEnter={() => setH(true)}
                    onMouseLeave={() => setH(false)}>
                    {l}
                  </a>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div className="footer-bottom" style={{ borderTop: '1px solid rgba(61,58,44,0.13)', paddingTop: '20px', position: 'relative', zIndex: 2 }}>
        <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.55rem', color: '#7A7A6A', letterSpacing: '0.05em' }}>© 2026 belleire. tous droits réservés.</span>
        <span style={{ fontFamily: "'Space Mono',monospace", fontSize: '0.55rem', color: '#7A7A6A', letterSpacing: '0.05em' }}>+32 499 999 340</span>
      </div>
    </footer>
  );
}
